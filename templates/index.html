<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local RAG Powered Chat bot</title>
    <meta name="description"
        content="Chat with your documents locally using AI. Upload PDFs and ask questions powered by local LLMs.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0a0e1a;
            --bg-subtle: #0f1629;
            --panel: rgba(17, 24, 50, 0.7);
            --panel-solid: #111832;
            --text: #e8edf5;
            --text-muted: #7a85a0;
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.3);
            --primary-hover: #818cf8;
            --accent: #a78bfa;
            --border: rgba(99, 102, 241, 0.15);
            --border-hover: rgba(99, 102, 241, 0.35);
            --success: #34d399;
            --error: #f87171;
            --user-msg: linear-gradient(135deg, #6366f1, #8b5cf6);
            --bot-msg: rgba(30, 38, 66, 0.8);
            --radius: 14px;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(167, 139, 250, 0.04) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            width: 100%;
            max-width: 1500px;
            margin: 0 auto;
            padding: 16px;
            gap: 16px;
            height: 100vh;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 360px;
            min-width: 320px;
            background: var(--panel);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: var(--radius);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            border: 1px solid var(--border);
            overflow-y: auto;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-header .logo {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--user-msg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: white;
            box-shadow: 0 4px 20px var(--primary-glow);
        }

        .sidebar-header h2 {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-header p {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group label span {
            float: right;
            color: var(--accent);
            font-weight: 500;
            text-transform: none;
            letter-spacing: 0;
        }

        input[type="text"],
        select {
            background: var(--bg-subtle);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 12px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.88rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        input[type="text"]:focus,
        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        input[type="file"] {
            background: var(--bg-subtle);
            border: 1px dashed var(--border);
            color: var(--text-muted);
            padding: 12px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        input[type="file"]:hover {
            border-color: var(--primary);
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: var(--border);
            border-radius: 4px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 8px var(--primary-glow);
        }

        .btn-init {
            background: var(--user-msg);
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 20px var(--primary-glow);
        }

        .btn-init:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 28px var(--primary-glow);
        }

        .btn-init:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #status-msg {
            font-size: 0.82rem;
            padding: 10px 12px;
            border-radius: 8px;
            display: none;
            line-height: 1.4;
            border: 1px solid transparent;
        }

        /* ── Chat Panel ── */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--panel);
            backdrop-filter: blur(24px);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            position: relative;
        }

        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.15);
        }

        .chat-header h3 {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .chat-header .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            display: inline-block;
            margin-right: 8px;
        }

        .chat-header .status-dot.active {
            background: var(--success);
            box-shadow: 0 0 8px rgba(52, 211, 153, 0.5);
        }

        .btn-clear {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.78rem;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .btn-clear:hover {
            border-color: var(--error);
            color: var(--error);
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }

        .chat-box::-webkit-scrollbar {
            width: 4px;
        }

        .chat-box::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .message {
            max-width: 78%;
            padding: 14px 18px;
            border-radius: 16px;
            line-height: 1.65;
            font-size: 0.92rem;
            animation: msgIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(12px);
            word-wrap: break-word;
        }

        @keyframes msgIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            background: var(--user-msg);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            color: white;
            box-shadow: 0 4px 16px var(--primary-glow);
        }

        .message.bot {
            background: var(--bot-msg);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        .message.bot h1,
        .message.bot h2,
        .message.bot h3,
        .message.bot h4 {
            margin: 12px 0 6px;
            font-size: 1em;
            color: var(--primary-hover);
        }

        .message.bot p {
            margin: 4px 0;
        }

        .message.bot ul,
        .message.bot ol {
            padding-left: 20px;
            margin: 6px 0;
        }

        .message.bot pre {
            background: #0a0e1a;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
            border: 1px solid var(--border);
        }

        .message.bot code {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.85em;
        }

        .message.bot code:not(pre code) {
            background: rgba(99, 102, 241, 0.15);
            padding: 2px 5px;
            border-radius: 4px;
        }

        .message.bot strong {
            color: var(--primary-hover);
        }

        .sources-block {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .source-item {
            margin: 4px 0;
            padding-left: 12px;
            border-left: 2px solid var(--primary);
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 14px 18px;
            align-self: flex-start;
            background: var(--bot-msg);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
            animation: msgIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        .typing-indicator span {
            width: 7px;
            height: 7px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: blink 1.4s infinite both;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {

            0%,
            80%,
            100% {
                opacity: 0.3;
                transform: scale(0.8)
            }

            40% {
                opacity: 1;
                transform: scale(1)
            }
        }

        /* Input area */
        .input-area {
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        #query {
            flex: 1;
            background: var(--bg-subtle);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 14px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            resize: none;
            min-height: 44px;
            max-height: 120px;
            line-height: 1.4;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #query:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        #query:disabled {
            opacity: 0.4;
        }

        .btn-send {
            background: var(--user-msg);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s, box-shadow 0.2s;
            flex-shrink: 0;
            box-shadow: 0 2px 12px var(--primary-glow);
        }

        .btn-send:hover {
            transform: scale(1.05);
        }

        .btn-send:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .btn-send svg {
            width: 18px;
            height: 18px;
        }

        /* Scroll-to-bottom */
        .scroll-btn {
            position: absolute;
            bottom: 90px;
            right: 24px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--panel-solid);
            border: 1px solid var(--border);
            color: var(--text-muted);
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 10;
            font-size: 16px;
        }

        .scroll-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 0.85rem;
            backdrop-filter: blur(12px);
            border: 1px solid;
            animation: toastIn 0.3s ease-out, toastOut 0.3s ease-in 3.7s forwards;
            max-width: 360px;
        }

        .toast.success {
            background: rgba(52, 211, 153, 0.12);
            border-color: rgba(52, 211, 153, 0.3);
            color: var(--success);
        }

        .toast.error {
            background: rgba(248, 113, 113, 0.12);
            border-color: rgba(248, 113, 113, 0.3);
            color: var(--error);
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(40px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes toastOut {
            to {
                opacity: 0;
                transform: translateX(40px);
            }
        }

        /* Responsive */
        @media (max-width: 900px) {
            .container {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
            }

            .sidebar {
                width: 100%;
                min-width: 0;
            }

            .main-chat {
                min-height: 60vh;
            }
        }
    </style>
</head>

<body>
    <div class="toast-container" id="toast-container"></div>
    <div class="container">
        <aside class="sidebar" role="complementary" aria-label="Configuration">
            <div class="sidebar-header">
                <div class="logo">R</div>
                <div>
                    <h2>Local RAG</h2>
                </div>
            </div>

            <form id="init-form" aria-label="Model initialization">
                <div class="form-group">
                    <label for="model_type">Model Engine</label>
                    <select id="model_type" name="model_type">
                        <option value="GGUF">GGUF (llama.cpp)</option>
                        <option value="HuggingFace">HuggingFace (Transformers)</option>
                    </select>
                </div>
                <div class="form-group" style="margin-top:12px">
                    <label for="model_path">Model Path or ID</label>
                    <input type="text" id="model_path" name="model_path" placeholder="./models/model.gguf" required>
                </div>
                <div class="form-group" style="margin-top:12px">
                    <label for="file">PDF Document</label>
                    <input type="file" id="file" name="file" accept=".pdf" required>
                </div>
                <div class="form-group" style="margin-top:12px">
                    <label for="temperature">Temperature <span id="temp-val">0.1</span></label>
                    <input type="range" id="temperature" name="temperature" min="0" max="2" step="0.1" value="0.1"
                        oninput="document.getElementById('temp-val').innerText=this.value">
                </div>
                <div class="form-group" style="margin-top:8px">
                    <label for="max_tokens">Max Tokens <span id="tokens-val">512</span></label>
                    <input type="range" id="max_tokens" name="max_tokens" min="128" max="4096" step="64" value="512"
                        oninput="document.getElementById('tokens-val').innerText=this.value">
                </div>
                <button type="submit" class="btn-init" id="init-btn" style="margin-top:16px">
                    <span>Initialize Context &amp; Model</span>
                    <div class="spinner" id="init-loader"></div>
                </button>
            </form>
            <div id="status-msg"></div>
        </aside>

        <main class="main-chat" role="main">
            <div class="chat-header">
                <div style="display:flex;align-items:center">
                    <span class="status-dot" id="status-dot"></span>
                    <h3>Chat</h3>
                </div>
                <button class="btn-clear" id="clear-btn" aria-label="Clear chat history">Clear Chat</button>
            </div>
            <div class="chat-box" id="chat-box" role="log" aria-live="polite">
                <div class="message bot">Hello! Upload a PDF and initialize the model to start querying your documents.
                </div>
            </div>
            <button class="scroll-btn" id="scroll-btn" aria-label="Scroll to bottom">↓</button>
            <form class="input-area" id="chat-form">
                <textarea id="query" placeholder="Ask something about the document…" rows="1" disabled
                    aria-label="Query input"></textarea>
                <button type="submit" class="btn-send" id="send-btn" disabled aria-label="Send message">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13" />
                        <polygon points="22 2 15 22 11 13 2 9 22 2" />
                    </svg>
                </button>
            </form>
        </main>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        const initForm = $('init-form'), chatForm = $('chat-form');
        const chatBox = $('chat-box'), statusMsg = $('status-msg');
        const initBtn = $('init-btn'), initLoader = $('init-loader');
        const queryInput = $('query'), sendBtn = $('send-btn');
        const statusDot = $('status-dot'), clearBtn = $('clear-btn');
        const scrollBtn = $('scroll-btn');
        let chatHistory = [], modelReady = false;

        // ── Toast ──
        function showToast(msg, type = 'success') {
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.textContent = msg;
            $('toast-container').appendChild(t);
            setTimeout(() => t.remove(), 4000);
        }

        // ── Auto-resize textarea ──
        queryInput.addEventListener('input', () => {
            queryInput.style.height = 'auto';
            queryInput.style.height = Math.min(queryInput.scrollHeight, 120) + 'px';
        });
        queryInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); chatForm.requestSubmit(); }
        });

        // ── Scroll-to-bottom button ──
        chatBox.addEventListener('scroll', () => {
            const gap = chatBox.scrollHeight - chatBox.scrollTop - chatBox.clientHeight;
            scrollBtn.style.display = gap > 120 ? 'flex' : 'none';
        });
        scrollBtn.addEventListener('click', () => chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' }));

        // ── Clear chat ──
        clearBtn.addEventListener('click', () => {
            chatHistory = [];
            chatBox.innerHTML = '<div class="message bot">Chat cleared. Ask a new question!</div>';
        });

        // ── Append message ──
        function appendMessage(sender, htmlContent) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = htmlContent;
            chatBox.appendChild(div);
            setTimeout(() => chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' }), 60);
            return div;
        }
        function showTyping() {
            const d = document.createElement('div');
            d.className = 'typing-indicator'; d.id = 'typing';
            d.innerHTML = '<span></span><span></span><span></span>';
            chatBox.appendChild(d);
            setTimeout(() => chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' }), 60);
        }
        function hideTyping() { const t = $('typing'); if (t) t.remove(); }

        function escapeHTML(s) {
            return s.replace(/[&<>'"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[c]));
        }

        // ── Init form ──
        initForm.addEventListener('submit', async e => {
            e.preventDefault();
            const formData = new FormData(initForm);
            initBtn.disabled = true;
            initLoader.style.display = 'block';
            statusMsg.style.display = 'block';
            statusMsg.textContent = 'Initializing model and processing document…';
            statusMsg.style.cssText += 'color:#93c5fd;background:rgba(99,102,241,0.08);border-color:rgba(99,102,241,0.2);display:block;';
            try {
                const res = await fetch('/api/init', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.status === 'success') {
                    statusMsg.textContent = data.message;
                    statusMsg.style.cssText += 'color:#34d399;background:rgba(52,211,153,0.08);border-color:rgba(52,211,153,0.2);';
                    statusDot.classList.add('active');
                    queryInput.disabled = false; sendBtn.disabled = false;
                    modelReady = true;
                    queryInput.focus();
                    chatBox.innerHTML = '<div class="message bot"> System ready! Ask anything about your document.</div>';
                    chatHistory = [];
                    showToast('Model initialized successfully!');
                } else { throw new Error(data.message); }
            } catch (err) {
                statusMsg.textContent = 'Error: ' + err.message;
                statusMsg.style.cssText += 'color:#f87171;background:rgba(248,113,113,0.08);border-color:rgba(248,113,113,0.2);';
                showToast(err.message, 'error');
            } finally {
                initBtn.disabled = false;
                initLoader.style.display = 'none';
            }
        });

        // ── Chat submit ──
        chatForm.addEventListener('submit', async e => {
            e.preventDefault();
            const query = queryInput.value.trim();
            if (!query || !modelReady) return;
            appendMessage('user', escapeHTML(query));
            queryInput.value = ''; queryInput.style.height = 'auto';
            queryInput.disabled = true; sendBtn.disabled = true;
            showTyping();
            try {
                const res = await fetch('/api/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, history: chatHistory })
                });
                const data = await res.json();
                hideTyping();
                if (data.status === 'success') {
                    let rendered = marked.parse(data.answer || '');
                    if (data.sources && data.sources.length > 0) {
                        rendered += '<div class="sources-block"><strong>📄 Sources:</strong>';
                        data.sources.forEach((src, i) => {
                            rendered += `<div class="source-item">Source ${i + 1} (Page ${src.page}): "${escapeHTML(src.snippet)}…"</div>`;
                        });
                        rendered += '</div>';
                    }
                    appendMessage('bot', rendered);
                    chatHistory.push({ role: 'user', content: query });
                    chatHistory.push({ role: 'assistant', content: data.answer });
                } else {
                    appendMessage('bot', 'Error: ' + escapeHTML(data.message));
                }
            } catch (err) {
                hideTyping();
                appendMessage('bot', 'Failed to communicate with local server.');
                showToast('Connection error', 'error');
            } finally {
                queryInput.disabled = false; sendBtn.disabled = false;
                queryInput.focus();
            }
        });
    </script>
</body>

</html>
